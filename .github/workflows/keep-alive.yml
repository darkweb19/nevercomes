name: Keep Supabase Alive

# Supabase pauses free-tier projects after 7 days of inactivity. A read query that hits
# Postgres resets that timer. Runs twice a week (max gap ~4 days) for buffer.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   SUPABASE_URL        e.g. https://<ref>.supabase.co
#   SUPABASE_ANON_KEY   public anon key (safe to use here)
#
# NOTE: GitHub disables scheduled workflows after ~60 days with no repo commits. While you're
# actively building this never triggers; if the project goes dormant, re-enable it in the
# Actions tab or push a commit.

on:
  schedule:
    - cron: '0 6 * * 1,4'      # 06:00 UTC every Monday and Thursday
  workflow_dispatch:            # manual trigger for testing

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Read from the database (resets the inactivity timer)
        run: |
          curl --fail --silent --show-error \
            "${{ secrets.SUPABASE_URL }}/rest/v1/vendors?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            -o /dev/null -w "ping ok: HTTP %{http_code}\n"
