name: CI

# The verify gate from rules/testing.md — typecheck + lint + unit on every PR and on main,
# plus the Playwright e2e of the full anonymous loop against a local Supabase stack.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm verify

  e2e:
    runs-on: ubuntu-latest
    needs: [verify]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Pinned: the `status -o env` key names (API_URL/ANON_KEY) are
      # CLI-version-sensitive.
      - uses: supabase/setup-cli@v1
        with: { version: 2.72.7 }
      - run: supabase start
      # Local-stack keys only (the standard local anon JWT) — no prod secrets here.
      - name: Point the app at the local stack
        run: |
          supabase status -o env \
            | grep -E '^(API_URL|ANON_KEY)=' \
            | sed -e 's/^API_URL=/NEXT_PUBLIC_SUPABASE_URL=/' \
                  -e 's/^ANON_KEY=/NEXT_PUBLIC_SUPABASE_ANON_KEY=/' \
            > .env.local
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:e2e
